apiVersion: apps/v1
kind: Deployment
metadata:
  name: caldrith
  labels:
    app: caldrith
spec:
  replicas: 1
  strategy:
    type: Recreate  # Single ingest replica; webhook dedup is centralised in Redis.
  selector:
    matchLabels:
      app: caldrith
  template:
    metadata:
      labels:
        app: caldrith
    spec:
      securityContext:
        runAsNonRoot: true
        # Numeric UID/GID so the kubelet can verify non-root. The image's `app`
        # user is uid/gid 1000; a name (USER app) alone makes runAsNonRoot fail
        # with "image has non-numeric user (app), cannot verify user is non-root".
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        # Web ingest (FastAPI). The heavy reconcile work runs in a separate ARQ
        # worker Deployment that runs THIS SAME IMAGE with the command overridden:
        #
        #   command: ["arq", "caldrith.worker.worker.WorkerSettings"]
        #
        # The worker is defined in deployment-worker.yaml (same image, command
        # overridden to `arq ...`, distinct `app: caldrith-worker` label so the
        # Service doesn't route to it).
        - name: caldrith
          image: ghcr.io/magmamoose/caldrith:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          # APP_ID / PRIVATE_KEY / WEBHOOK_SECRET come from OCI Vault via the
          # ExternalSecret (see externalsecret.yaml).
          envFrom:
            - secretRef:
                name: caldrith
            # MANUAL_TRIGGER_TOKEN guards POST /reconcile. It lives in its OWN
            # opt-in ExternalSecret (see k8s/optional/manual-trigger) and is marked
            # optional so leaving that Kustomization unapplied disables the endpoint
            # (404) instead of blocking pod startup or the core App credentials.
            - secretRef:
                name: caldrith-manual-trigger
                optional: true
          env:
            # In-cluster Valkey, no auth — not a secret, so set here, not in Vault.
            - name: REDIS_URL
              value: "redis://valkey.database.svc.cluster.local:6379"
            - name: GITHUB_API_URL
              value: "https://api.github.com"
            - name: ADMIN_REPO
              value: "admin"
            - name: CONFIG_PATH
              value: ".github"
            - name: SETTINGS_FILE_PATH
              value: "settings.yml"
            - name: LOG_LEVEL
              value: "INFO"
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
      restartPolicy: Always
