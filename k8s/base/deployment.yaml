apiVersion: apps/v1
kind: Deployment
metadata:
  name: caldrith
  labels:
    app: caldrith
spec:
  replicas: 1
  strategy:
    type: Recreate  # Single ingest replica; webhook dedup is centralised in Redis.
  selector:
    matchLabels:
      app: caldrith
  template:
    metadata:
      labels:
        app: caldrith
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        # Web ingest (FastAPI). The heavy reconcile work runs in a separate ARQ
        # worker Deployment that runs THIS SAME IMAGE with the command overridden:
        #
        #   command: ["arq", "caldrith.worker.worker.WorkerSettings"]
        #
        # The worker needs the same envFrom secret (APP_ID/PRIVATE_KEY/
        # WEBHOOK_SECRET/REDIS_URL) and the same securityContext, but NO ingress,
        # Service, or HTTP probes. It is intentionally not yet defined here — add a
        # second Deployment (e.g. deployment-worker.yaml) when reconcile load
        # justifies a dedicated worker pod.
        - name: caldrith
          image: ghcr.io/magmamoose/caldrith:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          # APP_ID / PRIVATE_KEY / WEBHOOK_SECRET / REDIS_URL come from OCI Vault
          # via the ExternalSecret (see externalsecret.yaml).
          envFrom:
            - secretRef:
                name: caldrith
          env:
            - name: GITHUB_API_URL
              value: "https://api.github.com"
            - name: ADMIN_REPO
              value: "admin"
            - name: CONFIG_PATH
              value: ".github"
            - name: SETTINGS_FILE_PATH
              value: "settings.yml"
            - name: LOG_LEVEL
              value: "INFO"
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
      restartPolicy: Always
