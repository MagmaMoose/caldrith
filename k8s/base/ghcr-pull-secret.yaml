# Mirror `ghcr-pull-secret` from the `flux-system` namespace into `caldrith`
# using external-secrets' Kubernetes provider — the same pattern diatreme-pro
# uses. The flux-system Secret is the SOPS-managed token that provably pulls
# ghcr.io/magmamoose/* (Flux's ImageRepository scans the caldrith image with it),
# so mirroring it removes any doubt about a per-user PAT's org-package scope.
# Cross-namespace RBAC (a Role/RoleBinding in flux-system that lets the
# `caldrith-ghcr-reader` ServiceAccount read the Secret) lives in the infra repo.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: caldrith-ghcr-reader

---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: ghcr-pull-secret-mirror
spec:
  provider:
    kubernetes:
      remoteNamespace: flux-system
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          namespace: caldrith
          key: ca.crt
      auth:
        serviceAccount:
          name: caldrith-ghcr-reader

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ghcr-pull-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: ghcr-pull-secret-mirror
    kind: SecretStore
  target:
    name: ghcr-pull-secret
    creationPolicy: Owner
    # The source is a kubernetes.io/dockerconfigjson Secret with one key
    # `.dockerconfigjson`. Re-emit the same shape so kubelet recognises it as an
    # image-pull credential. The dot-prefixed key needs index syntax in the
    # Go template.
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: "{{ index . `.dockerconfigjson` }}"
  dataFrom:
    - extract:
        key: ghcr-pull-secret
