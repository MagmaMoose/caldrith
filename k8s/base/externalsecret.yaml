apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: caldrith
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: caldrith
    creationPolicy: Owner
    template:
      type: Opaque
  # Produces a Secret named `caldrith` carrying the three GitHub App credentials the
  # app reads via pydantic-settings, consumed by the Deployment with envFrom. Each
  # secretKey maps to an OCI Vault entry.
  # REDIS_URL is NOT secret (in-cluster Valkey, no auth) and is set as a literal env
  # var in the Deployment — it is intentionally not pulled from Vault.
  #   APP_ID         — the GitHub App's numeric App ID   (vault: caldrith-github-app-id)
  #   PRIVATE_KEY    — the App's RSA private key PEM      (vault: caldrith-github-private-key)
  #   WEBHOOK_SECRET — the App's webhook signing secret  (vault: caldrith-github-webhook-secret)
  data:
    - secretKey: APP_ID
      remoteRef:
        key: caldrith-github-app-id
    - secretKey: PRIVATE_KEY
      remoteRef:
        key: caldrith-github-private-key
    - secretKey: WEBHOOK_SECRET
      remoteRef:
        key: caldrith-github-webhook-secret
