apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: caldrith
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: caldrith
    creationPolicy: Owner
    template:
      type: Opaque
  # Produces a Secret named `caldrith` carrying the four runtime secrets the app
  # reads via pydantic-settings, consumed by the Deployment with envFrom. Each key
  # maps to an OCI Vault entry:
  #   APP_ID         — the GitHub App's numeric App ID.
  #   PRIVATE_KEY    — the App's RSA private key, the full PEM string.
  #   WEBHOOK_SECRET — the App's webhook secret (HMAC-SHA256 signing key).
  #   REDIS_URL      — redis:// URL for the ARQ queue + webhook dedup.
  data:
    - secretKey: APP_ID
      remoteRef:
        key: caldrith-app-id
    - secretKey: PRIVATE_KEY
      remoteRef:
        key: caldrith-private-key
    - secretKey: WEBHOOK_SECRET
      remoteRef:
        key: caldrith-webhook-secret
    - secretKey: REDIS_URL
      remoteRef:
        key: caldrith-redis-url
