apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: caldrith-manual-trigger
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: caldrith-manual-trigger
    creationPolicy: Owner
    template:
      type: Opaque
  # Kept SEPARATE from the core `caldrith` ExternalSecret on purpose: MANUAL_TRIGGER_TOKEN
  # guards the optional break-glass endpoint (POST /reconcile), so a missing or not-yet-
  # created vault entry must never be able to break the App's real credentials. With this
  # isolated, an absent vault key just means the target Secret isn't created; the API's
  # `optional: true` envFrom then skips it and the endpoint stays disabled (404). To enable
  # the endpoint, create the vault entry below with a long random string, then restart the
  # API (or let the next rollout pick it up).
  #   MANUAL_TRIGGER_TOKEN — bearer token for POST /reconcile  (vault: caldrith-manual-trigger-token)
  data:
    # `secretKey` is the NAME of the key in the rendered Secret, not a literal token —
    # the actual value is pulled from the vault via `remoteRef` below. Suppress the KICS
    # "Generic Secret" false positive (rule 3e2d3b2f-c22a-4df1-9cc6-a7a0aebb0c99).
    # kics-scan ignore-line
    - secretKey: MANUAL_TRIGGER_TOKEN
      remoteRef:
        key: caldrith-manual-trigger-token
