apiVersion: apps/v1
kind: Deployment
metadata:
  name: caldrith-worker
  labels:
    app: caldrith-worker
spec:
  replicas: 1
  strategy:
    type: Recreate # Single worker; ARQ pulls jobs from the shared Valkey queue.
  selector:
    matchLabels:
      app: caldrith-worker
  template:
    metadata:
      labels:
        # Deliberately NOT `app: caldrith` — the Service selector targets the web
        # ingest only; the worker has no HTTP listener and must not receive traffic.
        app: caldrith-worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        # Reconcile worker: same image as the web ingest, command overridden to run
        # the ARQ worker, which consumes the jobs the ingest enqueues (per-repo /
        # per-installation reconcile) and applies settings via the GitHub API.
        - name: caldrith-worker
          image: ghcr.io/magmamoose/caldrith:latest
          imagePullPolicy: Always
          command: ["arq", "caldrith.worker.worker.WorkerSettings"]
          # APP_ID / PRIVATE_KEY / WEBHOOK_SECRET come from OCI Vault via the
          # ExternalSecret (see externalsecret.yaml).
          envFrom:
            - secretRef:
                name: caldrith
          env:
            # In-cluster Valkey, no auth — not a secret, so set here, not in Vault.
            - name: REDIS_URL
              value: "redis://valkey.database.svc.cluster.local:6379"
            - name: GITHUB_API_URL
              value: "https://api.github.com"
            - name: ADMIN_REPO
              value: "admin"
            - name: CONFIG_PATH
              value: ".github"
            - name: SETTINGS_FILE_PATH
              value: "settings.yml"
            - name: LOG_LEVEL
              value: "INFO"
            # Hourly belt-and-braces: re-reconcile every installation so a missed admin
            # webhook can't strand repos on stale config. Each enqueue is idempotent —
            # it converges to a no-op when nothing has drifted. The cron is registered
            # only in WorkerSettings, so this belongs on the worker, not the API.
            - name: RECONCILE_CRON_MINUTES
              value: "60"
          # No HTTP probes — this is a queue consumer, not a server. A crashed
          # worker is restarted by restartPolicy; an `arq --check` exec liveness can
          # be added once WorkerSettings.health_check_interval is tuned for it.
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
      restartPolicy: Always
